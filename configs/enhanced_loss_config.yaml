# Enhanced Loss Configuration
# 增强损失函数配置

# Loss function flags - 损失函数开关
use_focal: true          # 是否使用Focal Loss处理类别不平衡
use_iou: true            # 是否使用IoU Loss提高分割精度
use_boundary: true       # 是否使用边界损失提升边缘质量
use_adaptive_weighting: true   # 启用自适应权重调整

# Focal Loss parameters - Focal Loss参数
focal_alpha: 0.25        # 正样本权重，0.25表示正样本权重较小
focal_gamma: 2.0         # 聚焦参数，越大越关注难分类样本

# Boundary Loss parameters - 边界损失参数
boundary_kernel_size: 3  # 边界检测核大小

# Loss scaling factors - 损失缩放因子（用于平衡不同loss的数值范围）
loss_scaling_factors:
  ce: 2.0                # 交叉熵损失缩放因子（提高影响）
  dice: 1.5              # Dice损失缩放因子（提高影响）
  focal: 1.0             # Focal损失缩放因子
  iou: 0.8               # IoU损失缩放因子（提高影响）
  boundary: 0.3          # 边界损失缩放因子（降低主导效应）

# Adaptive weighting parameters - 自适应权重参数
adaptive_init_weights: [1.0, 1.0, 0.5, 0.3, 0.2]  # [ce, dice, focal, iou, boundary]初始权重
adaptive_temperature: 1.5  # 自适应权重的温度参数，控制权重分布的平滑度

# Curriculum learning parameters - 课程学习参数
use_curriculum_learning: true  # 是否使用课程学习
curriculum_schedule:
  focal_start_epoch: 2    # Focal loss开始使用的epoch
  iou_start_epoch: 3      # IoU loss开始使用的epoch
  boundary_start_epoch: 4 # Boundary loss开始使用的epoch
  full_weight_epoch: 8    # 所有loss达到完整权重的epoch

# Dataset-aware loss parameters - 数据集感知损失参数
use_dataset_aware_loss: true  # 是否使用数据集感知损失
dataset_weights:
  refcoco: 1.0           # RefCOCO数据集权重
  refcoco+: 1.0          # RefCOCO+数据集权重
  refcocog: 1.0          # RefCOCOg数据集权重
  ref-zom: 0.8           # Ref-ZOM数据集权重（相对较难）

# Point sampling parameters (inherited from original) - 点采样参数
num_points: 12544        # 112*112
oversample_ratio: 3.0
importance_sample_ratio: 0.75
