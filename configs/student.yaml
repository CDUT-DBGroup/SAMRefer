# ============================================
# 特征融合模块消融实验配置 (Feature Fusion Ablation)
# ============================================
# Exp-2.1: Baseline - 两个都设为 false
# Exp-2.2: + MultiScaleFusion - use_multi_scale_fusion: true, use_enhanced_c1c2_fusion: false
# Exp-2.3: + EnhancedC1C2Fusion - use_multi_scale_fusion: false, use_enhanced_c1c2_fusion: true
# Exp-2.4: + Both Fusion - 两个都设为 true
# Exp-2.5: + ViT-C3 Fusion - 由 use_csaf 控制（保留向后兼容）
# Exp-2.6: Full Fusion Module - 两个都设为 true，use_csaf: true

# 多尺度特征融合开关 (MultiScaleFusion: c2, c3, c4之间的跨尺度注意力融合)
use_multi_scale_fusion: true

# 增强的C1C2融合开关 (EnhancedC1C2Fusion: 空间注意力融合C1和C2)
use_enhanced_c1c2_fusion: true

# CSAF总开关（向后兼容，控制ViT-C3融合等，建议保持true以使用完整功能）
use_csaf: true

# ============================================
# 文本注意力聚合消融实验配置 (Text Attention Ablation)
# ============================================
# Exp-3.1: Baseline - use_lang_attention: false
# Exp-3.2: + Text Attention - use_lang_attention: true, use_lang_fusion_weights: false
# Exp-3.3: + Text Attention + Fusion - use_lang_attention: true, use_lang_fusion_weights: true
# Exp-3.4: Full Text Module - 同 Exp-3.3

# 文本注意力开关 (是否使用文本注意力机制聚合文本特征)
use_lang_attention: true

# 文本融合权重开关 (是否使用可学习权重融合基础token和注意力结果)
use_lang_fusion_weights: false

